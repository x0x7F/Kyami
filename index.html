
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyami Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FFD700; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-tab { background: var(--accent) !important; color: #000 !important; box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .book-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .book-card:active { transform: scale(0.94); }
        
        .img-container { position: relative; overflow: hidden; border-radius: 2rem; }
        .img-container img { transition: transform 0.6s ease; }
        .book-card:hover img { transform: scale(1.08); }
    </style>
</head>
<body class="pb-44">

    <header class="sticky top-0 z-50 glass px-8 py-6 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter italic uppercase">KYAMI<span class="text-[var(--accent)]">.</span></h1>
        <div class="flex items-center gap-4">
            <div class="hidden md:block bg-white/5 rounded-full px-4 py-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest border border-white/5">641 Library Assets</div>
            <button onclick="toggleSearch()" class="p-3 bg-white/5 rounded-2xl hover:bg-white/10 transition">
                <svg class="w-5 h-5 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
        </div>
    </header>

    <div id="search-bar" class="hidden px-8 py-4 animate-in fade-in slide-in-from-top-4 duration-300">
        <input type="text" id="q" oninput="doSearch()" placeholder="Search library..." 
               class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 outline-none focus:border-[var(--accent)] transition-all font-semibold">
    </div>

    <nav id="tabs" class="flex gap-3 px-8 py-6 overflow-x-auto no-scrollbar sticky top-[88px] z-40 bg-[#050505]/80 backdrop-blur-md"></nav>

    <main id="grid" class="px-8 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6 mt-2"></main>

    <div id="player" class="fixed bottom-8 left-6 right-6 glass p-5 rounded-[2.5rem] border border-white/10 hidden z-50 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col gap-4">
        <div class="flex items-center gap-5">
            <img id="p-img" src="" class="w-14 h-14 rounded-2xl object-cover bg-white/10 shadow-lg">
            <div class="flex-1 min-w-0">
                <h4 id="p-title" class="font-extrabold text-sm truncate tracking-tight">...</h4>
                <p id="p-author" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Author</p>
            </div>
            <button onclick="closePlayer()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-red-500/20 transition">✕</button>
        </div>
        <audio id="audio" controls class="w-full h-8 invert opacity-80 brightness-150"></audio>
    </div>

    <script>
        const RAW_BASE = "https://raw.githubusercontent.com/x0x7F/Kyami/main/books/";
        const RELEASE_URL = "https://github.com/x0x7F/Kyami/releases/download/v1.0/";
        let currentBooks = [];

        async function init() {
            const res = await fetch('./web_data/categories_index.json');
            const categories = await res.json();
            
            const tabs = document.getElementById('tabs');
            tabs.innerHTML = categories.map(c => `
                <button onclick="loadCat('${c.slug}')" id="t-${c.slug}" 
                        class="px-6 py-2.5 rounded-full bg-white/5 text-[10px] font-extrabold uppercase tracking-wider text-gray-400 border border-white/5 transition-all whitespace-nowrap">
                    ${c.name}
                </button>
            `).join('');

            if(categories.length > 0) loadCat(categories[0].slug);
        }

        async function loadCat(slug) {
            document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`t-${slug}`).classList.add('active-tab');

            const res = await fetch(`./web_data/${slug}.json`);
            currentBooks = await res.json();
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = currentBooks.map(b => {
                const imgUrl = `${RAW_BASE}${b.id}/images/cover.jpg`;
                return `
                <div class="book-card group">
                    <div class="img-container aspect-[3/4] mb-4 shadow-2xl bg-white/5">
                        <img src="${imgUrl}" onerror="this.src='https://placehold.co/300x400/111/222?text=NO+IMAGE'" 
                             class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="absolute bottom-4 left-4 right-4 translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-500">
                            <button onclick="play('${b.id}', '${(b.title_mm || b.title).replace(/'/g, "\\'")}', '${imgUrl}')" 
                                    class="w-full py-3 bg-[var(--accent)] text-black font-extrabold text-[10px] rounded-2xl uppercase tracking-widest shadow-xl">
                                Listen Now
                            </button>
                        </div>
                    </div>
                    <h3 class="text-sm font-bold tracking-tight text-white/90 line-clamp-1 mb-1">${b.title_mm || b.title}</h3>
                    <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${b.authors[0]?.name || 'Unknown'}</p>
                </div>`;
            }).join('');
        }

        function play(id, title, img) {
            const p = document.getElementById('player');
            const a = document.getElementById('audio');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = img;
            a.src = `${RELEASE_URL}${id}.mp3`;
            p.classList.remove('hidden');
            a.play();
        }

        function toggleSearch() {
            const s = document.getElementById('search-bar');
            s.classList.toggle('hidden');
            if(!s.classList.contains('hidden')) document.getElementById('q').focus();
        }

        function doSearch() {
            const q = document.getElementById('q').value.toLowerCase();
            const filtered = currentBooks.filter(b => b.title.toLowerCase().includes(q) || (b.title_mm && b.title_mm.includes(q)));
            renderFiltered(filtered);
        }

        function renderFiltered(list) {
            const grid = document.getElementById('grid');
            // Using a temporary render logic to avoid mutating global state
            const oldBooks = currentBooks;
            currentBooks = list;
            render();
            currentBooks = oldBooks;
        }

        function closePlayer() {
            document.getElementById('audio').pause();
            document.getElementById('player').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
