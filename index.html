<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYAMI_TERMINAL_v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root { --neon: #00FF41; --bg: #0D0208; }
        body { 
            background-color: var(--bg); 
            color: var(--neon); 
            font-family: 'Fira Code', monospace; 
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        .crt-border { border: 2px solid var(--neon); box-shadow: 0 0 10px var(--neon); }
        .btn-retro { border: 1px solid var(--neon); transition: 0.2s; text-transform: uppercase; font-weight: bold; }
        .btn-retro:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        
        /* Scanline Effect */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        img { filter: grayscale(100%) brightness(80%) contrast(120%); transition: 0.3s; }
        .book-card:hover img { filter: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 crt-border p-6 bg-black/50">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h1 class="text-3xl md:text-5xl font-bold tracking-widest">KYAMI.EXE_</h1>
                    <p class="text-xs mt-2 opacity-70">SYSTEM_ROOT: /x0x7F/KYAMI | STATUS: ONLINE</p>
                </div>
                <div class="flex flex-col items-end">
                    <input type="text" id="q" oninput="doSearch()" placeholder="[SEARCH_QUERY...]" 
                           class="bg-transparent border-b border-green-500 text-green-500 outline-none p-2 w-48 focus:w-64 transition-all">
                </div>
            </div>
        </header>

        <nav id="tabs" class="flex gap-4 mb-10 overflow-x-auto no-scrollbar pb-2">
            </nav>

        <main id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </main>
    </div>

    <div id="player" class="fixed bottom-0 left-0 w-full bg-black border-t-4 border-green-500 p-6 hidden z-[110]">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-6">
            <div class="flex items-center gap-4 flex-1">
                <div class="w-16 h-16 border border-green-500 p-1">
                    <img id="p-img" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h4 id="p-title" class="text-lg font-bold truncate max-w-xs md:max-w-md">FILE_NAME</h4>
                    <p class="text-[10px] opacity-60 uppercase">BITRATE: 128KBPS | DECODING...</p>
                </div>
            </div>
            <audio id="audio" controls class="w-full md:w-96 invert"></audio>
            <button onclick="document.getElementById('player').classList.add('hidden')" class="btn-retro px-4 py-2 text-xs">EXIT</button>
        </div>
    </div>

    <script>
        const RAW_BASE = "https://raw.githubusercontent.com/x0x7F/Kyami/main/books/";
        const RELEASE_URL = "https://github.com/x0x7F/Kyami/releases/download/v1.0/";
        let currentBooks = [];

        async function init() {
            const res = await fetch('./web_data/categories_index.json');
            const categories = await res.json();
            
            const tabs = document.getElementById('tabs');
            tabs.innerHTML = categories.map(c => `
                <button onclick="loadCat('${c.slug}')" id="t-${c.slug}" 
                        class="btn-retro px-4 py-2 text-[10px] whitespace-nowrap">
                    ./${c.name}
                </button>
            `).join('');

            if(categories.length > 0) loadCat(categories[0].slug);
        }

        async function loadCat(slug) {
            document.querySelectorAll('#tabs button').forEach(b => {
                b.style.background = "transparent";
                b.style.color = "#00FF41";
            });
            const active = document.getElementById(`t-${slug}`);
            active.style.background = "#00FF41";
            active.style.color = "black";

            const res = await fetch(`./web_data/${slug}.json`);
            currentBooks = await res.json();
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = currentBooks.map(b => {
                const imgUrl = `${RAW_BASE}${b.id}/images/cover.jpg`;
                return `
                <div class="book-card crt-border p-4 bg-black/40 hover:bg-green-500/10 transition-colors group">
                    <div class="aspect-[3/4] border border-green-900 mb-4 overflow-hidden">
                        <img src="${imgUrl}" onerror="this.src='https://placehold.co/300x400/000/00FF41?text=DATA_MISSING'" 
                             class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-sm font-bold mb-2 h-10 line-clamp-2">[${b.title_mm || b.title}]</h3>
                    <div class="text-[9px] opacity-60 mb-4 font-mono">
                        ID: ${b.id.toString().padStart(4, '0')}<br>
                        DUR: ${b.audio_duration || '??:??'}
                    </div>
                    <button onclick="play('${b.id}', '${(b.title_mm || b.title).replace(/'/g, "\\'")}', '${imgUrl}')" 
                            class="btn-retro w-full py-2 text-xs">
                        EXECUTE_PLAY
                    </button>
                </div>`;
            }).join('');
        }

        function play(id, title, img) {
            const p = document.getElementById('player');
            const a = document.getElementById('audio');
            document.getElementById('p-title').innerText = `PLAYING: ${title}`;
            document.getElementById('p-img').src = img;
            a.src = `${RELEASE_URL}${id}.mp3`;
            p.classList.remove('hidden');
            a.play();
        }

        function doSearch() {
            const q = document.getElementById('q').value.toLowerCase();
            const filtered = currentBooks.filter(b => b.title.toLowerCase().includes(q) || (b.title_mm && b.title_mm.includes(q)));
            renderFiltered(filtered);
        }

        function renderFiltered(list) {
            currentBooks = list;
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
